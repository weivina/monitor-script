name: monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run script
        run: |
          pip install requests
          python monitor.py

      - name: Commit data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add data.txt || true
          git commit -m "update data" || true
          git push
